name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: dcb, POSTGRES_PASSWORD: dcb, POSTGRES_DB: dcb }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dcb" --health-interval 5s
          --health-timeout 3s --health-retries 10
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Types
        run: mypy app
      - name: Tests
        env: { DATABASE_URL: "postgresql+psycopg://dcb:dcb@localhost:5432/dcb" }
        run: pytest -q

  docs-gate:
    # The requirements invariant gate keeps running alongside the app.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Requirements invariants
        run: bash .softhouse/verify-docs.sh
