[alembic]
script_location = migrations
# The ledger design requires a LINEAR migration chain — never branch it.
sqlalchemy.url =
# set at runtime via -x or DATABASE_URL in env.py wiring

[loggers]
keys = root
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARN
handlers = console
qualname =
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
