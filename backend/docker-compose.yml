# Local/dev stack. Production hosting is operator-chosen (data residency).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dcb
      POSTGRES_PASSWORD: dcb
      POSTGRES_DB: dcb
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcb"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://dcb:dcb@db:5432/dcb
      DCB_ENV: development
    depends_on:
      db:
        condition: service_healthy
    ports: ["8000:8000"]
