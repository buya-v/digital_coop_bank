/api/v1/admin/loans/{id}/write-off:
  post:
    tags: [EP-12]
    operationId: adminWriteOffLoan
    summary: >-
      Write off a defaulted loan — DEFAULTED → WRITTEN_OFF under DUAL approval only
      (04 §3.12). Auth: staff LOAN_OFFICER (maker) + a second approver (checker ≠
      maker). Audit-logged. EP-6 entity-gated (CLAUDE.md); contract only.
    security:
      - staffSSO: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdminLoanWriteOffRequest'
    responses:
      '202':
        description: >-
          Write-off proposed under dual approval; effective only after the second
          approver decides (E-53). INFERRED 202 — 04 names the maker-checker gate
          but not the HTTP status.
        content:
          application/json:
            schema:
              type: object
              properties:
                approval_id:
                  type: string
                  format: uuid
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'
      '422':
        description: 422 NOT_DEFAULTED — the loan is not in DEFAULTED state (04 §3.12).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

