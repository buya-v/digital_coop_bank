      names Persona; substitution is a pending requirements change (CLAUDE.md).
    security:
      - staffSSO: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Evidence pack (INFERRED shape; 04 §3.12 names the contents but does not pin a schema).
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'

/api/v1/admin/cases/{id}/decision:
  post:
    tags: [EP-12]
    operationId: adminDecideCase
    summary: >-
      Decide a compliance case (04 §3.12). Auth: staff COMPLIANCE_OFFICER;
      rejections four-eyes. KYC APPROVE→KycStatus APPROVED / REJECT→REJECTED
      (+reason_codes[]); AML DISMISS|ESCALATE_SAR (escalation opens a SAR case, no
      member-visible traces). Audit-logged.
    security:
      - staffSSO: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ComplianceCaseDecisionRequest'
    responses:
      '200':
        description: Case resolved + downstream state changes (E-54).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceCase'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'
      '422':
        description: 422 REASON_CODES_REQUIRED — a KYC `REJECT` needs `reason_codes[]` (04 §3.12).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

