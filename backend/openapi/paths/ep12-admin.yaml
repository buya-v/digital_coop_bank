        $ref: '#/components/responses/NotFound'
      '409':
        description: 409 BALLOT_NOT_CLOSED — the voting window has not closed (04 §3.12).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

/api/v1/admin/config-parameters:
  get:
    tags: [EP-12]
    operationId: adminListConfigParameters
    summary: >-
      List configuration-parameter versions with effective dates, approvals and
      `governing_ballot_id` links (04 §3.12). Auth: staff OPS_ADMIN, FINANCE_ADMIN,
      AUDITOR (read).
    security:
      - staffSSO: []
    parameters:
      - name: key
        in: query
        required: false
        description: 04 §3.12 `?key=` — filter by parameter key.
        schema:
          type: string
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
    responses:
      '200':
        description: Parameter versions (E-55).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigurationParameterListResponse'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
  post:
    tags: [EP-12]
    operationId: adminCreateConfigParameter
    summary: >-
      Create a new configuration-parameter version pending checker approval (04
      §3.12). Auth: staff, role per parameter domain (maker-checker). Ballot link
      mandatory for FINANCIAL_POLICY / GOVERNANCE_BYLAW-governed keys. Audit-logged.
      NON-SEED: `value` is a typed value; no seed constants baked (task T2).
    security:
      - staffSSO: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConfigurationParameterCreateRequest'
    responses:
      '201':
        description: New version created, pending checker approval (E-55; dual approval mandatory).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigurationParameter'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '422':
        description: >-
          422 BALLOT_LINK_REQUIRED — a FINANCIAL_POLICY / GOVERNANCE_BYLAW-governed
          key needs `governing_ballot_id`; or 422 EFFECTIVE_DATE_PAST —
          `effective_from` is in the past (04 §3.12).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
