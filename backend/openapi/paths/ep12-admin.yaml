# EP-12 Admin & Back-Office — path operations (04 §3.12).
# One operation per §3.12 method. This is the STAFF console: EVERY operation uses
# the staff token audience (`security: - staffSSO: []`, root securityScheme;
# 04 §3.0 — staff resources live under /api/v1/admin/...), overriding the document
# default memberOAuth2. Per §3.12, ALL mutations are maker-checker + audit-logged
# (E-53 / US-13.3): each mutating op notes this and, where the contract needs it,
# surfaces the MakerCheckerApproval reference. Common error codes apply everywhere
# (04 §3.0). All $refs local.
#
# NOT IN THIS SLICE (deliberate, to avoid duplicate-path/duplicate-schema at merge):
#  * POST /api/v1/admin/members/{id}/status-transitions — the §3.12 row says
#    "see §3.2"; the path is already defined in paths/ep2-shares.yaml. Not redefined
#    here (the assembly duplicate-path check would reject it).
#  * "Dividend run administration | See §3.7 admin rows" — those paths
#    (/api/v1/admin/dividends/...) belong to EP-7; owned by that epic's slice.

/api/v1/admin/members:
  get:
    tags: [EP-12]
    operationId: adminSearchMembers
    summary: >-
      Search members by name / member_id / email / phone (04 §3.12). Auth: staff
      OPS_ADMIN, COMPLIANCE_OFFICER, AUDITOR (read).
    security:
      - staffSSO: []
    parameters:
      - name: q
        in: query
        required: false
        description: 04 §3.12 `?q=` search term.
        schema:
          type: string
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
    responses:
      '200':
        description: Search results.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminMemberSearchResponse'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '429':
        $ref: '#/components/responses/TooManyRequests'

/api/v1/admin/members/{id}:
  get:
    tags: [EP-12]
    operationId: adminGetMember360
    summary: >-
      360° member view — profile, membership/KYC status, accounts, loans,
      guarantees, governance participation (never vote content), cases, unified
      timeline (04 §3.12). Auth: staff OPS_ADMIN, COMPLIANCE_OFFICER, AUDITOR.
    security:
      - staffSSO: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: 360° member view (AML_ALERT/SAR cases excluded — tipping-off safeguard).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminMember360'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'

/api/v1/admin/members/{id}/notes:
  post:
    tags: [EP-12]
    operationId: adminCreateMemberNote
    summary: >-
      Add a case note, incl. card-dispute operational notes at launch (04 §3.12,
      US-5.1). Auth: staff OPS_ADMIN. Audit-logged.
    security:
      - staffSSO: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdminMemberNoteRequest'
    responses:
      '201':
        description: Case note created (audit-logged, 04 §3.12).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminMemberNote'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'
      '422':
        $ref: '#/components/responses/UnprocessableEntity'

/api/v1/admin/approvals/{id}/decision:
  post:
    tags: [EP-12]
    operationId: adminDecideApproval
    summary: >-
      Resolve a maker-checker approval (04 §3.12). Auth: any staff role holding
      checker rights for the `action_type`; checker must differ from maker. The
      target action executes on approval. Audit-logged.
    security:
      - staffSSO: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MakerCheckerDecisionRequest'
    responses:
      '200':
        description: MakerCheckerApproval resolved; target action executed on APPROVE (E-53).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakerCheckerApproval'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        description: 403 MAKER_CANNOT_CHECK — the checker is the maker, or lacks checker rights for the `action_type` (04 §3.12).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        $ref: '#/components/responses/NotFound'
      '410':
        description: 410 APPROVAL_EXPIRED — the approval window has lapsed (04 §3.12).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

