              pin_set_token:
                type: string
                description: Issuer-hosted PIN-widget handshake token (04 §3.5).
    responses:
      '200':
        description: 'PIN set (`pin_set:true`).'
        content:
          application/json:
            schema:
              type: object
              properties:
                pin_set:
                  type: boolean
      '401':
        description: 401 STEP_UP_REQUIRED — fresh step-up assertion missing/expired (04 §3.5/§5.1).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'

