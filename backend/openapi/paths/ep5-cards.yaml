            schema:
              $ref: '#/components/schemas/Error'

/api/v1/cards/{id}/pin:
  put:
    tags: [EP-5]
    operationId: setCardPin
    summary: >-
      Set the card PIN via issuer-hosted widget handshake (04 §3.5). Auth: Member
      (owner) + step-up. The PIN itself lives at the issuer-processor only.
    description: >-
      ENTITY-GATED (not buildable): documented for completeness only. Card
      credential (PIN) set — requires the `stepUpAssertion` scheme (04 §5.1).
      Not buildable until the SCC entity / payment-licence decision (CLAUDE.md).
    x-entity-gated: true
    x-entity-gated-reason: "Not buildable until the SCC entity / payment-licence decision (CLAUDE.md). Documented for completeness."
    security:
      - memberOAuth2: []
        stepUpAssertion: []
    parameters:
      - $ref: '#/components/parameters/CardIdPath'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [pin_set_token]
