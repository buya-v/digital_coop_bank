  post:
    tags: [EP-5]
    operationId: activateCard
    summary: >-
      Activate a card via last-4 confirmation (04 §3.5). Auth: Member (owner) +
      step-up.
    description: >-
      ENTITY-GATED (not buildable): documented for completeness only. Card
      activation, step-up per 04 §3.5. Not buildable until the SCC entity /
      payment-licence decision (CLAUDE.md).
    x-entity-gated: true
    x-entity-gated-reason: "Not buildable until the SCC entity / payment-licence decision (CLAUDE.md). Documented for completeness."
    security:
      - memberOAuth2: []
        stepUpAssertion: []
    parameters:
      - $ref: '#/components/parameters/CardIdPath'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
