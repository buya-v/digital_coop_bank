/api/v1/loan-circles/{id}/pledges:
  post:
    tags: [EP-6]
    operationId: createPeerGuaranteePledge
    summary: >-
      Pledge a guarantee (locks savings/share capital via a ledger hold on
      signature) (04 §3.6, DEC-7, US-6.4). Auth: Circle member + step-up.
      Money-movement (places a ledger hold) — Idempotency-Key required.
    description: >-
      ENTITY-GATED (not buildable): documented for completeness only. Step-up per
      04 §3.6/§5.1; Idempotency-Key applied because the pledge posts a ledger hold
      (CLAUDE.md money-movement non-negotiable) — NOTE: 04 §3.6 does not itself
      list Idempotency-Key on this row. Not buildable until the SCC entity /
      payment-licence decision (CLAUDE.md).
    x-entity-gated: true
    x-entity-gated-reason: "Not buildable until the SCC entity / payment-licence decision (CLAUDE.md). Documented for completeness."
    security:
      - memberOAuth2: []
        stepUpAssertion: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/IdempotencyKey'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [pledge_source, source_account_id, pledged_amount]
            properties:
              pledge_source:
                $ref: '#/components/schemas/PledgeSource'
              source_account_id:
                type: string
                format: uuid
              pledged_amount:
                $ref: '#/components/schemas/Money'
    responses:
      '201':
        description: >-
          Pledge created (E-23; `status:"PENDING_SIGNATURE"`, `agreement_document_id`;
          on signature ⇒ LOCKED + ledger hold).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeerGuarantee'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'
      '409':
        description: 409 IDEMPOTENCY_CONFLICT on key reuse with a different payload (04 §3.0).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '422':
        description: >-
          422 EXCEEDS_AVAILABLE_BALANCE or 422 SHARE_PLEDGE_UNAVAILABLE_IN_JURISDICTION
          (share-capital enforceability behind `jurisdiction_flag`, Open Item 2) (04 §3.6).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

