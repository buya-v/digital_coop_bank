      Auth: Member (ACTIVE).
    description: >-
      ENTITY-GATED (not buildable): documented for completeness only. `repayment_estimate`
      is a typed `Money` amount only — no rate / APR / computed installment
      (blocked DEC-48/49). Not buildable until the SCC entity / payment-licence
      decision (CLAUDE.md).
    x-entity-gated: true
    x-entity-gated-reason: "Not buildable until the SCC entity / payment-licence decision (CLAUDE.md). Documented for completeness."
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [loan_product_id, requested_amount, requested_term_months, purpose]
            properties:
              loan_product_id:
                type: string
