# EP-6 Lending & Loan Circles — path operations (04_technical_architecture.md §3.6).
# One operation per §3.6 endpoint row (multi-endpoint rows split per method+path).
# Merged into `paths` by openapi/validate.py. All $refs are local.
#
# ============================================================================
# ENTITY-GATED EPIC. CLAUDE.md: lending should be DEFERRED and is unlawful-until
# the entity decision (DEC-48's 12% APR below the 17.45% market rate; FRC DTI
# folding of fintech credit; over-credited market; SCC constraints). EVERY
# operation carries `x-entity-gated: true` + `x-entity-gated-reason` and a
# description note — documented for record completeness ONLY, not readiness.
# ============================================================================
#
# BLOCKED — NOT ENCODED: the loan RATE model (DEC-48/49) and any computed
# installment number are blocked on a pending decision. NO interest rate, APR,
# or basis-points field appears in this contract; installment / repayment /
# principal / interest amounts are typed `Money` fields only. The 04 §2.6/§3.6
# APR keys (`base_rate_apr_bps`, `apr_bps`, `standard_apr_bps`,
# `discounted_apr_bps`, `circle_rate_discount_tiers`) are intentionally OMITTED
# pending DEC-48/49 (see per-schema notes).
#
# Step-up (04 §3.6/§5.1): offer-acceptance, pledges, signature-sessions, autopay.
# Idempotency-Key (money-movement, CLAUDE.md non-negotiable): loan payments and
# guarantee pledges (a pledge places a ledger hold).

