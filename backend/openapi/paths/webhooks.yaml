# Inbound vendor webhooks (task T4) — one operation per 04 §3.14 row (7 rows).
# Merged into `paths` by openapi/validate.py. All $refs are local.
#
# SOURCE: 04_technical_architecture.md §3.14 (the seven rows; each pins PATH,
# SOURCE vendor, PURPOSE, VERIFICATION verbatim) and §4 (the four platform
# integration rules). Base path from §3.0: "Inbound vendor webhooks under
# `/api/v1/webhooks/...` (signature-verified, no OAuth)".
#
# ── AUTH MODEL ────────────────────────────────────────────────────────────
# These are NOT member/staff endpoints — they are vendor-authenticated. Every
# operation sets `security: []` to OVERRIDE the document-level `memberOAuth2`
# default (root.yaml §22-26 explicitly anticipates this override for webhooks;
# §3.0 says "no OAuth"). The vendor SIGNATURE VERIFICATION named in the §3.14
# "Verification" column is represented per-operation via the `x-webhook-verification`
# extension (verbatim value) plus a description note — NOT as a `securityScheme`,
# because a new scheme would have to live in components.securitySchemes (root.yaml,
# owned by the foundation task T1) and the assembler merges only paths/ + schemas/
# + params/, never securitySchemes, from a slice. INFERRED: the concrete header
# names / signing mechanics are vendor-specific and are NOT pinned by `04`; only
# the verification *method* (HMAC, mTLS, JWT, hash check) per row is pinned.
#
# ── §4 PLATFORM RULES (applied to every operation) ────────────────────────
# (1) signature-verified + replay-protected + idempotent -> `x-webhook-verification`
#     records the method; a replayed event returns the original ack (WebhookAck),
#     and a replay/idempotency conflict surfaces as 409 (shared Conflict, which
#     already names IDEMPOTENCY_CONFLICT). (2) correlation ID -> WebhookAck echoes
#     `correlation_id`. (3) graceful degradation and (4) scoped keys are
#     operational, not request/response shape, so they are noted in prose only.
#
# ── VENDOR NAMES ──────────────────────────────────────────────────────────
# Persona / Stripe / Lithic / Plaid appear verbatim in these paths per §3.14.
# Each operation's description flags the vendor set as a PENDING Mongolia
# requirements change (these US vendors are not the Mongolian market — CLAUDE.md).

/api/v1/webhooks/persona:
  post:
    tags: [webhooks]
    operationId: personaWebhook
    summary: >-
      Inbound Persona eKYC webhook — inquiry outcome drives KycStatus
      transitions; screening hits open a ComplianceCase (04 §3.14). Vendor-
      authenticated, NOT a member/staff endpoint.
    description: >-
      04 §3.14 row 1. The backend re-fetches full inquiry results server-to-
      server keyed on `inquiry_id` and never trusts the payload alone (04 §4.1).
      PENDING Mongolia requirements change: Persona is the DEC-5 vendor recorded
      verbatim but is not the Mongolian market — the compliant alternative is a
      XYP/ХУР state-register lookup (CLAUDE.md).
    security: []
    x-webhook-verification: 'HMAC signature + replay window (04 §3.14)'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PersonaInquiryWebhook'
    responses:
      '200':
        description: Event accepted (idempotent ack; 04 §4 rule 1).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookAck'
      '401':
        description: >-
          401 SIGNATURE_INVALID — HMAC signature verification failed or the
          replay window was exceeded (04 §3.14 verification; §4 rule 1). Uniform
          error envelope. INFERRED code string.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '409':
        $ref: '#/components/responses/Conflict'
      '422':
        $ref: '#/components/responses/UnprocessableEntity'

/api/v1/webhooks/stripe:
  post:
    tags: [webhooks]
    operationId: stripeWebhook
    summary: >-
      Inbound Stripe webhook — share-purchase payment_intent settlement/failure
      drives US-2.1 activation (04 §3.14). Vendor-authenticated, NOT a
      member/staff endpoint.
    description: >-
      04 §3.14 row 2. On `payment_intent.succeeded` the ledger posts
      SHARE_SUBSCRIPTION and the member transitions to ACTIVE (04 §4.3); the
      settled amount must equal the DEC-11 par value. PENDING Mongolia
      requirements change: Stripe is recorded verbatim but is not the Mongolian
      market (CLAUDE.md).
    security: []
    x-webhook-verification: 'Signature header (04 §3.14)'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StripePaymentIntentWebhook'
    responses:
      '200':
        description: Event accepted (idempotent ack; 04 §4 rule 1).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookAck'
      '401':
        description: >-
          401 SIGNATURE_INVALID — signature-header verification failed (04 §3.14;
          §4 rule 1). Uniform error envelope. INFERRED code string.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '409':
        $ref: '#/components/responses/Conflict'
      '422':
        description: >-
          422 AMOUNT_MISMATCH — settled amount != configured par value, or
          malformed payload (04 §4.3). Uniform error envelope.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

/api/v1/webhooks/lithic/authorization:
  post:
    tags: [webhooks]
    operationId: lithicAuthorizationWebhook
    summary: >-
      Inbound Lithic real-time authorization webhook — synchronous APPROVE/DECLINE
      decision within a 200 ms ceiling (04 §3.14). Vendor-authenticated, NOT a
      member/staff endpoint.
    description: >-
      04 §3.14 row 3. Unlike the other webhooks, the 2xx body is a DECISION, not
      a bare ack: the Card Service evaluates card status, member controls, and
      available balance and answers within the 200 ms hard ceiling; on timeout a
      vendor-side stand-in rule applies (04 §4.4; §6 perf budget). PENDING
      Mongolia requirements change: Lithic is recorded verbatim but is not the
      Mongolian market — cards clear through NETC, and EP-5 Cards is entity-gated
      / likely unlawful for an SCC (CLAUDE.md).
    security: []
    x-webhook-verification: 'mTLS + HMAC (04 §3.14)'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LithicAuthorizationWebhook'
    responses:
      '200':
        description: Authorization decision (APPROVE/DECLINE) returned within 200 ms (04 §4.4).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LithicAuthorizationDecision'
      '401':
        description: >-
          401 SIGNATURE_INVALID — mTLS/HMAC verification failed (04 §3.14; §4
          rule 1). Uniform error envelope. INFERRED code string.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '422':
        $ref: '#/components/responses/UnprocessableEntity'

/api/v1/webhooks/lithic/events:
  post:
    tags: [webhooks]
    operationId: lithicEventsWebhook
    summary: >-
      Inbound Lithic asynchronous events — settlements (-> Round-Up), card
      lifecycle, and fulfilment updates (04 §3.14). Vendor-authenticated, NOT a
      member/staff endpoint.
    description: >-
      04 §3.14 row 4. Settlements post Transactions and emit events consumed by
      the Round-Up Service; fulfilment webhooks update `fulfilment.stage` (04
      §4.4). PENDING Mongolia requirements change: Lithic is recorded verbatim
      but is not the Mongolian market; EP-10 Round-Ups is also entity-gated
      (CLAUDE.md).
    security: []
    x-webhook-verification: 'HMAC (04 §3.14)'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LithicEventWebhook'
    responses:
      '200':
        description: Event accepted (idempotent ack; 04 §4 rule 1).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookAck'
      '401':
        description: >-
          401 SIGNATURE_INVALID — HMAC verification failed (04 §3.14; §4 rule 1).
          Uniform error envelope. INFERRED code string.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '409':
        $ref: '#/components/responses/Conflict'
      '422':
        $ref: '#/components/responses/UnprocessableEntity'

/api/v1/webhooks/baas:
  post:
    tags: [webhooks]
    operationId: baasWebhook
    summary: >-
      Inbound sponsor-bank / BaaS webhook — rail status (sent/settled/returned),
      returns with codes, and inbound credits (04 §3.14). Vendor-authenticated,
      NOT a member/staff endpoint.
    description: >-
      04 §3.14 row 5. Rail webhooks drive Transaction status; a `returned` event
      posts reversing ledger entries with the return code in `failure_reason`;
      duplicate-webhook tolerance is via `external_ref` idempotency (04 §4
      external flow). PENDING Mongolia requirements change: ACH/wire/RTP are
      US/EU rails — Mongolia uses Banksuljee (RTGS)/ACH+/NETC; rail values are
      recorded verbatim from `04`, not renamed (CLAUDE.md).
    security: []
    x-webhook-verification: 'mTLS + signature (04 §3.14)'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaasStatusWebhook'
    responses:
      '200':
        description: Event accepted (idempotent ack; 04 §4 rule 1).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookAck'
      '401':
        description: >-
          401 SIGNATURE_INVALID — mTLS/signature verification failed (04 §3.14;
          §4 rule 1). Uniform error envelope. INFERRED code string.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '409':
        $ref: '#/components/responses/Conflict'
      '422':
        $ref: '#/components/responses/UnprocessableEntity'

/api/v1/webhooks/plaid:
  post:
    tags: [webhooks]
    operationId: plaidWebhook
    summary: >-
      Inbound Plaid webhook — item status (relink required) and transaction
      refresh for underwriting (04 §3.14). Vendor-authenticated, NOT a
      member/staff endpoint.
    description: >-
      04 §3.14 row 6. Item-status events drive the E-14 `RELINK_REQUIRED` status
      (04 §3.4); transaction refresh feeds EP-6 underwriting (deferred —
      CLAUDE.md). PENDING Mongolia requirements change: Plaid is recorded
      verbatim but has no coverage in-market (CLAUDE.md); `item_id` corresponds
      to the leaked `plaid_item_ref` field.
    security: []
    x-webhook-verification: 'JWT verification (04 §3.14)'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlaidWebhook'
    responses:
      '200':
        description: Event accepted (idempotent ack; 04 §4 rule 1).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookAck'
      '401':
        description: >-
          401 SIGNATURE_INVALID — JWT verification failed (04 §3.14; §4 rule 1).
          Uniform error envelope. INFERRED code string.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '409':
        $ref: '#/components/responses/Conflict'
      '422':
        $ref: '#/components/responses/UnprocessableEntity'

/api/v1/webhooks/esign:
  post:
    tags: [webhooks]
    operationId: esignWebhook
    summary: >-
      Inbound e-signature webhook — envelope completed/declined triggers pledge
      lock or loan disbursement (04 §3.14). Vendor-authenticated, NOT a
      member/staff endpoint.
    description: >-
      04 §3.14 row 7. On completion the executed PDF is stored with its SHA-256
      in SignedDocument (verified against `envelope_hash`) before the domain
      consequence fires — pledge LOCKED + ledger hold, or loan disbursement (04
      §4.6). The e-signature provider is unnamed in `04`; vendor selection is a
      PENDING Mongolia requirements change. Downstream EP-6 Lending is deferred
      (CLAUDE.md).
    security: []
    x-webhook-verification: 'HMAC + envelope hash check (04 §3.14)'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EsignEnvelopeWebhook'
    responses:
      '200':
        description: Event accepted (idempotent ack; 04 §4 rule 1).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookAck'
      '401':
        description: >-
          401 SIGNATURE_INVALID — HMAC verification failed (04 §3.14; §4 rule 1).
          Uniform error envelope. INFERRED code string.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '409':
        $ref: '#/components/responses/Conflict'
      '422':
        description: >-
          422 HASH_MISMATCH — envelope hash did not match the stored
          SignedDocument hash, or malformed payload (04 §3.14 hash check; §4.6).
          Uniform error envelope. INFERRED code string.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
