RecipientIdentifierType:
  type: string
  description: DEC-3 recipient identifier type (04 §3.4 `identifier_type`; E-11 `invited_via`).
  enum:
  - PHONE
  - EMAIL
  - MEMBER_ID
VerificationMethod:
  type: string
  description: E-14 `verification_method` (04 §2.4).
  enum:
  - PLAID_INSTANT
  - MICRO_DEPOSIT
ExternalAccountLinkStatus:
  type: string
  description: E-14 `status` (04 §2.4).
  enum:
  - PENDING_VERIFICATION
  - VERIFIED
  - RELINK_REQUIRED
  - REMOVED
PayeeType:
  type: string
  description: E-15 `payee_type` (04 §2.4).
  enum:
  - INTERNAL_MEMBER
  - EXTERNAL_ACCOUNT
  - BILLER
PayeeStatus:
  type: string
  description: E-15 `status` (04 §2.4).
  enum:
  - ACTIVE
  - ARCHIVED
Rail:
  type: string
  description: 'E-16 `rail` (04 §2.4). PENDING REQUIREMENTS CHANGE: these rails (ACH / WIRE / RTP, plus
    `INTERNAL_P2P`) are US/EU constructs. Mongolia clears through Banksүлжээ / Banksuljee (RTGS, above
    the Governor-set threshold), ACH+ at or below it (24/7), and NETC for cards — see CLAUDE.md. The rail
    mapping is a pending requirements change; NOT invented or renamed here — 04''s values are recorded
    verbatim.'
  enum:
  - INTERNAL_P2P
  - ACH
  - WIRE
  - RTP
ExternalRail:
  type: string
  description: 'Rail values accepted by POST /payments/external (04 §3.4 `rail` = `ACH | WIRE | RTP`).
    Same PENDING REQUIREMENTS CHANGE as `Rail`: Mongolia uses Banksuljee / ACH+ / NETC, not ACH/WIRE/RTP.
    Recorded verbatim, not renamed.'
  enum:
  - ACH
  - WIRE
  - RTP
PaymentDirection:
  type: string
  description: POST /payments/external `direction` (04 §3.4).
  enum:
  - INBOUND
  - OUTBOUND
ScheduleType:
  type: string
  description: E-16 `schedule.type` (04 §2.4).
  enum:
  - ONE_OFF
  - RECURRING
ScheduledPaymentStatus:
  type: string
  description: E-16 `status` (04 §2.4).
  enum:
  - ACTIVE
  - PAUSED
  - COMPLETED
  - CANCELLED
  - FAILED
SplitMode:
  type: string
  description: E-17 `split_mode` (04 §2.4).
  enum:
  - EQUAL
  - CUSTOM
PaymentRequestStatus:
  type: string
  description: E-17 `status` (04 §2.4).
  enum:
  - OPEN
  - PARTIALLY_SETTLED
  - SETTLED
  - CANCELLED
  - EXPIRED
PaymentRequestShareStatus:
  type: string
  description: E-17 per-share `status` (04 §2.4).
  enum:
  - PENDING
  - PAID
  - DECLINED
  - CANCELLED
ExternalAccountLink:
  type: object
  description: 'E-14 ExternalAccountLink (04 §2.4) — a verified external bank account (US-4.2), linked
    via Plaid or micro-deposit fallback. VENDOR ASSUMPTION: 04 names Plaid; vendor substitution is a pending
    requirements change (CLAUDE.md), not a settled integration detail.'
  properties:
    id:
      type: string
      format: uuid
    member_id:
      type: string
      format: uuid
    plaid_item_ref:
      type: string
      nullable: true
      description: Encrypted vendor reference (04 §2.4). Vendor (Plaid) assumed — pending Mongolia migration.
    processor_token_ref:
      type: string
      nullable: true
      description: Encrypted vendor reference (04 §2.4).
    institution_name:
      type: string
    account_mask:
      type: string
    account_subtype:
      type: string
    verification_method:
      $ref: '#/components/schemas/VerificationMethod'
    status:
      $ref: '#/components/schemas/ExternalAccountLinkStatus'
    open_banking_consent:
      type: boolean
      description: Explicit consent to reuse transaction data for underwriting (04 §2.4, E-4).
    created_at:
      type: string
      format: date-time
    verified_at:
      type: string
      format: date-time
      nullable: true
Payee:
  type: object
  description: E-15 Payee (04 §2.4) — bill-pay payee managed by the member (US-4.3).
  properties:
    id:
      type: string
      format: uuid
    member_id:
      type: string
      format: uuid
    name:
      type: string
      maxLength: 100
    payee_type:
      $ref: '#/components/schemas/PayeeType'
    target_ref:
      type: string
      description: 'Recipient identifier (DEC-3) or ExternalAccountLink/biller details (04 §2.4). INFERRED
        as string: 04 does not pin a single shape across the three payee_type variants.'
    status:
      $ref: '#/components/schemas/PayeeStatus'
    created_at:
      type: string
      format: date-time
ScheduleSpec:
  type: object
  description: E-16 `schedule` JSON (04 §2.4).
  properties:
    type:
      $ref: '#/components/schemas/ScheduleType'
    start_date:
      type: string
      format: date
    frequency:
      type: string
      nullable: true
      description: type inferred; 04 does not specify the recurrence frequency enum.
    end_date:
      type: string
      format: date
      nullable: true
ScheduledPayment:
  type: object
  description: E-16 ScheduledPayment (04 §2.4) — future-dated or recurring payment over internal or external
    rails (US-4.3).
  properties:
    id:
      type: string
      format: uuid
    member_id:
      type: string
      format: uuid
    source_account_id:
      type: string
      format: uuid
    payee_id:
      type: string
      format: uuid
    amount:
      $ref: '#/components/schemas/Money'
    rail:
      $ref: '#/components/schemas/Rail'
    schedule:
      $ref: '#/components/schemas/ScheduleSpec'
    next_run_at:
      type: string
      format: date-time
    retry_policy:
      type: object
      additionalProperties: true
      nullable: true
      description: Insufficient-funds retries with member notification (04 §2.4, US-11.1). INFERRED element
        shape.
    status:
      $ref: '#/components/schemas/ScheduledPaymentStatus'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
PaymentRequestShare:
  type: object
  description: E-17 child share row (04 §2.4).
  properties:
    identifier_type:
      $ref: '#/components/schemas/RecipientIdentifierType'
    identifier:
      type: string
      description: Debtor identifier per RecipientIdentifierType (04 §2.4). type inferred; 04 does not
        pin format.
    amount:
      $ref: '#/components/schemas/Money'
    status:
      $ref: '#/components/schemas/PaymentRequestShareStatus'
    settled_transaction_id:
      type: string
      format: uuid
      nullable: true
PaymentRequest:
  type: object
  description: E-17 PaymentRequest (04 §2.4) — expense split / request-to-pay among members (US-4.4).
    Non-members out of scope.
  properties:
    id:
      type: string
      format: uuid
    requester_member_id:
      type: string
      format: uuid
    origin_transaction_id:
      type: string
      format: uuid
      nullable: true
      description: Split of an existing entry, or null for an ad-hoc amount (04 §2.4).
    split_mode:
      $ref: '#/components/schemas/SplitMode'
    total_amount:
      $ref: '#/components/schemas/Money'
    shares:
      type: array
      items:
        $ref: '#/components/schemas/PaymentRequestShare'
    reminders_sent:
      type: integer
    status:
      $ref: '#/components/schemas/PaymentRequestStatus'
    created_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time
RecipientLookupResult:
  type: object
  description: Response of POST /payments/recipient-lookup (04 §3.4). Confirmation-before-send.
  properties:
    recipient_display_name:
      type: string
      description: Mongolian short form = patronymic initial + given name per DEC-35 (e.g. "Ц. Бат") (04
        §3.4).
    recipient_ref:
      type: string
      description: Opaque, short-lived reference passed to POST /payments/p2p (04 §3.4).
